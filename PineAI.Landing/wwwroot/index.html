    <!-- Structured Data: Organization -->
    <script type="application/ld+json">

      "name": "PineAI",

      "foundingLocation": "Iran",
      "knowsAbout": [
        "SMS Marketing",
        "Customer Relationship Management",

        "Order Tracking",
        "E-commerce Tools",
        "Bale Messenger Bot",

        "ربات بله",

    <!-- Structured Data: Software Application -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "PineAI",
      "alternateName": "پاین‌ای",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web Browser",
      "inLanguage": "fa",
      "description": "پلتفرم یکپارچه مدیریت مشتریان برای فروشگاه‌های آنلاین: ارسال پیامک انبوه، ربات پشتیبانی هوشمند در بله با هوش مصنوعی GPT، و سیستم رهگیری سفارش اختصاصی.",

        "مدیریت لیست مشتریان",

        "priceCurrency": "IRR",

    <!-- Structured Data: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "پاین‌ای چیست؟",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "پاین‌ای یک پلتفرم هوشمند مدیریت مشتریان برای فروشگاه‌های آنلاین ایران است که شامل سه ابزار اصلی می‌شود: سیستم ارسال پیامک انبوه، ربات پشتیبانی هوشمند در پیام‌رسان بله با هوش مصنوعی، و سیستم رهگیری سفارش اختصاصی."
          }
        },
        {
          "@type": "Question",
          "name": "ربات بله پاین‌ای چگونه کار می‌کند؟",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ربات پاین‌ای در پیام‌رسان بله با استفاده از هوش مصنوعی به سوالات مشتریان پاسخ می‌دهد، وضعیت سفارش‌ها را از پایگاه داده استعلام می‌گیرد و در صورت نیاز، مکالمه را به تیم پشتیبانی انسانی ارجاع می‌دهد."
          }
        },
        {
          "@type": "Question",
          "name": "آیا برای استفاده از پاین‌ای نیاز به دانش فنی دارم؟",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "خیر. تیم پاین‌ای تمام مراحل راه‌اندازی، سفارشی‌سازی و آموزش را انجام می‌دهد. شما فقط به یک فروشگاه آنلاین و لیست مشتریان خود نیاز دارید."
          }
        }
      ]
    }
    </script>

    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="app-loading" aria-live="polite" aria-label="در حال بارگذاری">
            <div class="spinner"></div>
            <p>در حال بارگذاری...</p>
        </div>
    </div>

    <div id="blazor-error-ui" role="alert">
        خطایی رخ داد.
        <a href="." class="reload">بارگذاری مجدد</a>
        <span class="dismiss" tabindex="0">🗙</span>
    </div>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').catch(console.error);
        }
        // Smooth scroll for anchor links (no JS lib needed)
        document.addEventListener('click', function(e) {
            var a = e.target.closest('a[href^="#"]');
            if (a) {
                var id = a.getAttribute('href').slice(1);
                var el = document.getElementById(id);
                if (el) { e.preventDefault(); el.scrollIntoView({ behavior: 'smooth' }); }
            }
        });
    </script>
</body>

</html>
